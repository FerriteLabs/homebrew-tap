name: Build Bottles

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Ferrite version (e.g., 0.1.0)'
        required: true
        type: string
  repository_dispatch:
    types: [new-release]

jobs:
  bottle:
    strategy:
      matrix:
        include:
          - os: macos-14
            arch: arm64_sonoma
          - os: macos-14
            arch: arm64_ventura
          - os: macos-13
            arch: sonoma
          - os: macos-13
            arch: ventura
          - os: ubuntu-latest
            arch: x86_64_linux
    runs-on: ${{ matrix.os }}

    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@v1

      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build bottle
        run: |
          brew install --build-bottle ./ferrite.rb
          brew bottle --json --root-url="https://github.com/ferritelabs/homebrew-tap/releases/download/v${{ inputs.version || github.event.client_payload.version }}" ./ferrite.rb

      - name: Upload bottle
        uses: actions/upload-artifact@v4
        with:
          name: bottle-${{ matrix.arch }}
          path: |
            ferrite--*.bottle.tar.gz
            ferrite--*.bottle.json

  collect:
    needs: bottle
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Download all bottles
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Merge bottle JSON and update formula
        run: |
          # Merge all bottle JSON files
          python3 -c "
          import json, glob
          bottles = {}
          for f in glob.glob('ferrite--*.bottle.json'):
              with open(f) as fh:
                  data = json.load(fh)
                  for formula, info in data.items():
                      if formula not in bottles:
                          bottles[formula] = info
                      else:
                          bottles[formula]['bottle']['tags'].update(info['bottle']['tags'])
          print(json.dumps(bottles, indent=2))
          " > merged-bottles.json
          echo "Merged bottle JSON:"
          cat merged-bottles.json

      - name: Update formula with bottle checksums
        run: |
          python3 << 'PYEOF'
          import json, re

          with open("merged-bottles.json") as f:
              data = json.load(f)

          # Extract bottle tags (platform -> sha256)
          checksums = {}
          for formula, info in data.items():
              for tag, tag_info in info.get("bottle", {}).get("tags", {}).items():
                  checksums[tag] = tag_info.get("sha256", "")

          # Map platform names to formula identifiers
          platform_map = {
              "arm64_sonoma": "arm64_sonoma",
              "arm64_ventura": "arm64_ventura",
              "arm64_sequoia": "arm64_sequoia",
              "sonoma": "sonoma",
              "ventura": "ventura",
              "x86_64_linux": "x86_64_linux",
          }

          with open("ferrite.rb") as f:
              formula = f.read()

          for platform, identifier in platform_map.items():
              if platform in checksums and checksums[platform]:
                  pattern = rf'(sha256 cellar: :any_skip_relocation, {re.escape(identifier)}:\s+)"[a-f0-9]+"'
                  replacement = rf'\1"{checksums[platform]}"'
                  formula = re.sub(pattern, replacement, formula)

          with open("ferrite.rb", "w") as f:
              f.write(formula)

          print(f"Updated {len(checksums)} bottle checksums in ferrite.rb")
          PYEOF

      - name: Commit formula update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ferrite.rb
          if git diff --cached --quiet; then
            echo "No bottle checksum changes to commit"
          else
            git commit -m "chore: update bottle checksums for v${{ inputs.version || github.event.client_payload.version }}"
            git push
          fi

      - name: Create release with bottles
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version || github.event.client_payload.version }}
          files: ferrite--*.bottle.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
